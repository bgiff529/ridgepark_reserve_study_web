services:
  - type: web
    name: reserve-study-web
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: DEFAULT_VARIANT
        value: 2026_brendan_plan
      - key: APP_PASSWORD
        sync: false
